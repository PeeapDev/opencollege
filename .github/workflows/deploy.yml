name: Deploy to college.edu.sl

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync → live server
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://college.edu.sl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, ctype, curl, dom, gd, intl, mbstring, openssl, pdo_mysql, xml, zip
          tools: composer:v2

      - name: Install composer dependencies (production)
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Build frontend assets
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund
            npm run build --if-present
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          # Quick smoke test
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo connected as \$(whoami) on \$(hostname)"

      - name: Rsync application files
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no" \
            --include='/app/***' \
            --include='/bootstrap/app.php' \
            --include='/bootstrap/providers.php' \
            --include='/config/***' \
            --include='/database/***' \
            --include='/docs/***' \
            --include='/public/***' \
            --include='/resources/***' \
            --include='/routes/***' \
            --include='/tests/***' \
            --include='/vendor/***' \
            --include='/artisan' \
            --include='/composer.json' \
            --include='/composer.lock' \
            --include='/package.json' \
            --include='/package-lock.json' \
            --include='/phpunit.xml' \
            --include='/vite.config.js' \
            --include='/README.md' \
            --include='/LICENSE' \
            --include='/AUTHORS.md' \
            --include='/PRIVACY.md' \
            --include='/INSTALLATION.md' \
            --include='/CONTRIBUTING.md' \
            --include='/SECURITY.md' \
            --include='/.editorconfig' \
            --include='/.gitignore' \
            --include='/.env.example' \
            --exclude='*' \
            --exclude='/bootstrap/cache/*' \
            --exclude='/public/storage' \
            --exclude='/public/hot' \
            --exclude='/public/build/hot' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Post-deploy — run artisan commands on live server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             php artisan down --retry=10 --secret=deploying || true && \
             php artisan migrate --force --no-interaction && \
             php artisan config:clear && \
             php artisan route:clear && \
             php artisan view:clear && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan storage:link 2>/dev/null || true && \
             php artisan up"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
